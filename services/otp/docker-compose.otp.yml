# OpenTripPlanner 2.5 — multimodal routing (walk + transit + ferry + rail)
#
# Provides:
#   GET /otp/routers/default  — router info (health probe)
#   GET /otp/routers/default/plan?... — itinerary planner
#   POST /otp/routers/default/plan    — itinerary planner (JSON body)
#
# Port bound to WireGuard VPN interface only (10.100.0.2:8080).
# Graph must be pre-built by build-graph.sh into /var/otp/graphs/iberia/.
#
# RAM: 8 GB limit, ~7 GB heap.  Iberia graph (Spain + Portugal GTFS) loads
#      in ~2-3 min.  graph.obj is built externally, mounted read-only at
#      /var/otp/graphs/iberia.
#
# Consumed by /api/route (multimodal profile, see src/types/routing.ts).

services:
  otp:
    build:
      context: .
      dockerfile: Dockerfile
    image: trafico-otp:2.5
    container_name: trafico-otp
    restart: unless-stopped
    ports:
      - "10.100.0.2:8080:8080"
    volumes:
      # Pre-built graph — generated by build-graph.sh, mounted read-only.
      - /var/otp/graphs/iberia:/var/otp/graphs/iberia:ro
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx7G -Xms2G -XX:+UseG1GC"
    healthcheck:
      # OTP2 returns router metadata JSON once graph is fully loaded.
      test:
        [
          "CMD-SHELL",
          "wget -q -O- http://localhost:8080/otp/routers/default 2>&1 | grep -q 'routerId' || exit 1"
        ]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
      replicas: 1
    logging:
      driver: loki
      options:
        loki-url: "http://10.100.0.2:3100/loki/api/v1/push"
        loki-batch-size: "400"
        loki-retries: "2"
        labels: "app=trafico-otp"
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: trafico-routing
    external: true
