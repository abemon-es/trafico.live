# Martin tile server configuration
# Serves real-time PostGIS layers as vector tiles (MVT)
# Tables use lat/lng decimals — geometry constructed via SQL functions

# Prometheus metrics at /_/metrics (same port as tile API)
observability:
  metrics:
    add_labels:
      service: martin-tile
      env: prod

postgres:
  connection_string: ${DATABASE_URL}
  pool_size: 4
  auto_publish: false

  functions:
    # --- Real-time traffic ---
    sensors:
      schema: public
      function: tile_sensors
    incidents:
      schema: public
      function: tile_incidents
    roadworks:
      schema: public
      function: tile_roadworks
    city_sensors:
      schema: public
      function: tile_city_sensors

    # --- Transport ---
    fleet:
      schema: public
      function: tile_fleet
    aircraft:
      schema: public
      function: tile_aircraft
    vessels:
      schema: public
      function: tile_vessels
    transit_vehicles:
      schema: public
      function: tile_transit_vehicles

    # --- Maritime ---
    emergencies:
      schema: public
      function: tile_emergencies
