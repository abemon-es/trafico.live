# Valhalla routing engine — isochrones + truck profile only
#
# General car/bike/foot routing is handled by OSRM (S0).
# Valhalla is dedicated to:
#   POST /isochrone  — drive-time polygons (car + truck)
#   POST /route      — truck routing with dimension/weight restrictions
#   GET  /status     — health check
#
# Graph build: ~20 min on first start, then serves requests.
# RAM: ~4-6 GB for Spain+Portugal graph
#
# Port 8002 bound to WireGuard VPN interface (10.100.0.2)

services:
  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    container_name: trafico-valhalla
    restart: unless-stopped
    environment:
      tile_url: "file:///data/osm/iberia.osm.pbf"
      use_tiles_ignore_pbf: "False"
      build_elevation: "False"
      build_admins: "True"
      build_time_zones: "True"
      build_transit: "False"
      server_threads: "4"
      serve_tiles: "True"
    volumes:
      - /opt/trafico/tiles/build:/data/osm:ro
      - valhalla-data:/custom_files
    ports:
      - "10.100.0.2:8002:8002"
    healthcheck:
      # 2026-05-02: was `wget --spider` but valhalla image has no wget.
      # python3 is the only HTTP-capable tool in the image.
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8002/status', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 1800s
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    # 2026-05-02: switched off `driver: loki` — the Loki Docker plugin is
    # disabled on compute (cascading dockerd backpressure). Vector tail-s
    # the json-file logs at /var/lib/docker/containers/*/*.log instead.
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
        tag: "{{.Name}}"

volumes:
  valhalla-data:
    name: trafico-valhalla-data
