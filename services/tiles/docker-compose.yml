services:
  tiles:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      martin:
        condition: service_started
    ports:
      - "8088:80"
    volumes:
      - /opt/trafico/tiles/tiles:/data/tiles:ro
      - /opt/trafico/tiles/fonts:/data/fonts:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    # Traefik routing handled via file provider at /data/coolify/proxy/dynamic/tiles.yaml
    # (routes to host port 8088, avoids Docker network cross-network issues with Martin)
    labels:
      - "traefik.enable=false"

  martin:
    build:
      context: ../martin
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
    expose:
      - "3000"
    ports:
      - "10.100.0.2:3089:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: tiles-nginx-exporter
    command: ["--nginx.scrape-uri=http://tiles/nginx_status"]
    ports:
      - "10.100.0.2:9113:9113"
    depends_on:
      - tiles
    restart: unless-stopped
