proxy_cache_path /var/cache/nginx/tiles levels=1:2 keys_zone=tiles:10m max_size=1g inactive=10m;

upstream martin {
    server martin:3000;
}

server {
    listen 80;
    server_name _;

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # PMTiles files — needs HTTP range requests
    location /tiles/ {
        alias /data/tiles/;

        # CORS — allow trafico.live and localhost
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Range, If-Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Range, Content-Length, Accept-Ranges' always;

        # Handle OPTIONS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Range, If-Range';
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            return 204;
        }

        # Enable range requests (critical for PMTiles)
        add_header Accept-Ranges bytes always;

        # Cache headers — tiles don't change often
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;

        types {
            application/octet-stream pmtiles;
        }
    }

    # Serve the PMTiles file at root level too (for pmtiles:// protocol)
    location ~ ^/([^/]+\.pmtiles)$ {
        alias /data/tiles/$1;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Range, If-Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Range, Content-Length, Accept-Ranges' always;
        add_header Accept-Ranges bytes always;
        add_header Cache-Control "public, max-age=86400" always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Range, If-Range';
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Dynamic vector tiles from Martin (real-time PostGIS layers)
    location /dynamic/ {
        proxy_pass http://martin/;
        proxy_cache tiles;
        proxy_cache_valid 200 60s;
        proxy_cache_use_stale updating;
        proxy_cache_background_update on;
        proxy_cache_key "$uri";

        # Strip Martin's CORS header to avoid duplicates
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
        add_header X-Cache-Status $upstream_cache_status always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS';
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Font glyphs for Protomaps
    location /fonts/ {
        alias /data/fonts/;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # Sprite assets
    location /sprites/ {
        alias /data/sprites/;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header Cache-Control "public, max-age=604800" always;
    }
}
