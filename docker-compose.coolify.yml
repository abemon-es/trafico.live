# trafico.live — Coolify Service Deployment
#
# Deploy as a Coolify "Docker Compose" application.
# All containers are visible in the Coolify UI.
#
# Architecture:
#   web               — Next.js app (trafico.live)
#   collector-realtime — incident, v16, panel, detector, intensity, andorra (every 2-5 min)
#   collector-frequent — weather, maritime-forecast, portugal-weather (every 6h)
#   collector-fuel     — gas-station, maritime-fuel, portugal-fuel (3x daily)
#   collector-daily    — camera, charger, insights (daily)
#   collector-weekly   — radar, speedlimit, risk-zones, zbe (weekly)

x-collector: &collector-base
  build:
    context: .
    dockerfile: services/collector/Dockerfile.cron
  restart: unless-stopped
  environment:
    DATABASE_URL: ${DATABASE_URL}
    REDIS_URL: ${REDIS_URL}
    SENTRY_DSN: ${SENTRY_DSN}
    TZ: Europe/Madrid
    NODE_ENV: production
  mem_limit: 512m
  mem_reservation: 128m
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ─── Web Application ────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      API_KEYS: ${API_KEYS}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
      SENTRY_DSN: ${SENTRY_DSN}
      NODE_ENV: production
    mem_limit: 4096m
    mem_reservation: 1024m
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)throw new Error();process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Realtime Collectors (every 2-5 min) ────────────────────────────
  # incident, v16, panel, detector, intensity, andorra
  collector-realtime:
    <<: *collector-base
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      TZ: Europe/Madrid
      NODE_ENV: production
      CRONTAB_TIER: realtime

  # ─── Frequent Collectors (every 6h) ────────────────────────────────
  # weather, maritime-forecast, portugal-weather
  collector-frequent:
    <<: *collector-base
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      TZ: Europe/Madrid
      NODE_ENV: production
      CRONTAB_TIER: frequent
    mem_limit: 256m

  # ─── Fuel Price Collectors (3x daily) ──────────────────────────────
  # gas-station, maritime-fuel, portugal-fuel
  collector-fuel:
    <<: *collector-base
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      TZ: Europe/Madrid
      NODE_ENV: production
      CRONTAB_TIER: fuel
    mem_limit: 512m

  # ─── Daily Collectors ──────────────────────────────────────────────
  # camera, charger, insights
  collector-daily:
    <<: *collector-base
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      TZ: Europe/Madrid
      NODE_ENV: production
      CRONTAB_TIER: daily
    mem_limit: 256m

  # ─── Weekly Collectors ─────────────────────────────────────────────
  # radar, speedlimit, risk-zones, zbe
  collector-weekly:
    <<: *collector-base
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      TZ: Europe/Madrid
      NODE_ENV: production
      CRONTAB_TIER: weekly
    mem_limit: 256m
