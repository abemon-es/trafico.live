[build]
# Use root directory only
watchPatterns = ["src/**", "public/**", "prisma/**", "package.json", "package-lock.json"]

# Increase Node memory for TypeScript compilation
buildCommand = "NODE_OPTIONS='--max-old-space-size=4096' npm run build"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
