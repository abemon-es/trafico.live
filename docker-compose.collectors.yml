# trafico.live — Data Collectors (standalone deploy)
#
# Healthcheck: image ships /app/healthcheck.sh which checks /tmp/last-run staleness.
# On first deploy, we touch the marker so containers start healthy and wait for their
# first cron window instead of flapping unhealthy during the gap.

x-collector: &collector-base
  build:
    context: .
    dockerfile: services/collector/Dockerfile.cron
  restart: unless-stopped
  init: true
  env_file: [.env.collectors]
  networks:
    - web
  # Log to json-file — Vector (exp-vector) scrapes /var/lib/docker/containers/*
  # and ships to Loki without holding dockerd hostage to Loki backpressure.
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "3"
      tag: "{{.Name}}"

# 2026-05-02: NODE_OPTIONS set at ~67% of mem_limit for every collector.
# Same V8 over-mapping pattern that bit collector-ais (commit 5757fded):
# Node's default max-old-space-size on a 251 GB host is ~125 GB virt, which
# blows even our 3 GB cgroups. collector-realtime hit this at 11:55 UTC on
# 2026-05-02 (4 OOM kills in 6 seconds).
services:
  collector-realtime:
    <<: *collector-base
    container_name: collector-realtime
    environment:
      CRONTAB_TIER: realtime
      NODE_OPTIONS: "--max-old-space-size=2048"
    # 2026-05-07: bumped 3 GB → 5 GB after 12 OOM kills/hr — multiple
    # concurrent supercronic-spawned Node tasks (ais-stream, transit-realtime,
    # panel, intensity, ...) each up to ~2 GB heap totalled past the cgroup.
    mem_limit: 5120m
    cpus: 2.0

  collector-frequent:
    <<: *collector-base
    container_name: collector-frequent
    environment:
      CRONTAB_TIER: frequent
      NODE_OPTIONS: "--max-old-space-size=700"
    mem_limit: 1024m
    cpus: 1.0

  collector-fuel:
    <<: *collector-base
    container_name: collector-fuel
    environment:
      CRONTAB_TIER: fuel
      NODE_OPTIONS: "--max-old-space-size=350"
    mem_limit: 512m
    cpus: 0.5

  collector-daily:
    <<: *collector-base
    container_name: collector-daily
    environment:
      CRONTAB_TIER: daily
      NODE_OPTIONS: "--max-old-space-size=1024"
    mem_limit: 1536m
    cpus: 1.0

  collector-weekly:
    <<: *collector-base
    container_name: collector-weekly
    environment:
      CRONTAB_TIER: weekly
      NODE_OPTIONS: "--max-old-space-size=1400"
    mem_limit: 2048m
    mem_reservation: 1g
    cpus: 1.0

  collector-ais:
    <<: *collector-base
    container_name: collector-ais
    restart: always
    environment:
      TASK: ais-stream
      COLLECTOR_DURATION: "0"
      # Cap V8 heap to 400 MB so cgroup virt stays well under mem_limit.
      # Without this, Node maps its default max-old-space (~half system RAM
      # on large machines) as virtual memory, causing spurious OOM kills even
      # when actual RSS is only ~210 MB.
      NODE_OPTIONS: "--max-old-space-size=400"
    command: ["node", "--import", "tsx", "index.ts"]
    healthcheck:
      test: ["CMD", "sh", "-c", "kill -0 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    mem_limit: 768m
    cpus: 0.5

networks:
  web:
    external: true
