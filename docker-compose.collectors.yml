# trafico.live — Data Collectors
#
# Deploy as a separate Coolify "Docker Compose" application.
# Independent from the web app — collector deploys don't restart the site.
#
# 5 tiers grouped by update frequency:
#   collector-realtime — incident, v16, panel, detector, intensity, andorra (every 2-5 min)
#   collector-frequent — weather, maritime-forecast, portugal-weather (every 6h)
#   collector-fuel     — gas-station, maritime-fuel, portugal-fuel (3x daily)
#   collector-daily    — camera, charger, insights (daily)
#   collector-weekly   — radar, speedlimit, risk-zones, zbe (weekly)

x-collector: &collector-base
  build:
    context: .
    dockerfile: services/collector/Dockerfile.cron
  restart: unless-stopped
  environment:
    DATABASE_URL: ${DATABASE_URL}
    REDIS_URL: ${REDIS_URL}
    SENTRY_DSN: ${SENTRY_DSN}
    TZ: Europe/Madrid
    NODE_ENV: production
  mem_limit: 512m
  mem_reservation: 128m
  logging:
    driver: loki
    options:
      loki-url: "http://10.100.0.2:3100/loki/api/v1/push"
      loki-batch-size: "400"
      loki-retries: "2"
      loki-max-backoff: "1s"
      labels: "app=trafico-collector"
      max-size: "10m"
      max-file: "3"

services:
  # ─── Realtime (every 2-5 min) ──────────────────────────────────────
  # incident, v16, panel, detector, intensity, andorra
  collector-realtime:
    <<: *collector-base
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      TZ: Europe/Madrid
      NODE_ENV: production
      CRONTAB_TIER: realtime

  # ─── Frequent (every 6h) ──────────────────────────────────────────
  # weather, maritime-forecast, portugal-weather
  collector-frequent:
    <<: *collector-base
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      TZ: Europe/Madrid
      NODE_ENV: production
      CRONTAB_TIER: frequent
    mem_limit: 256m

  # ─── Fuel (3x daily) ──────────────────────────────────────────────
  # gas-station, maritime-fuel, portugal-fuel
  collector-fuel:
    <<: *collector-base
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      TZ: Europe/Madrid
      NODE_ENV: production
      CRONTAB_TIER: fuel
    mem_limit: 512m

  # ─── Daily ─────────────────────────────────────────────────────────
  # camera, charger, insights
  collector-daily:
    <<: *collector-base
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      TZ: Europe/Madrid
      NODE_ENV: production
      CRONTAB_TIER: daily
    mem_limit: 256m

  # ─── Weekly ────────────────────────────────────────────────────────
  # radar, speedlimit, risk-zones, zbe
  collector-weekly:
    <<: *collector-base
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SENTRY_DSN: ${SENTRY_DSN}
      TZ: Europe/Madrid
      NODE_ENV: production
      CRONTAB_TIER: weekly
    mem_limit: 256m
