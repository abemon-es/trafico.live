# trafico.live — Data Collectors (standalone deploy)
#
# Healthcheck: image ships /app/healthcheck.sh which checks /tmp/last-run staleness.
# On first deploy, we touch the marker so containers start healthy and wait for their
# first cron window instead of flapping unhealthy during the gap.

x-collector: &collector-base
  build:
    context: .
    dockerfile: services/collector/Dockerfile.cron
  restart: unless-stopped
  init: true
  env_file: [.env.collectors]
  networks:
    - web
  logging:
    driver: loki
    options:
      loki-url: "http://10.100.0.2:3100/loki/api/v1/push"
      loki-batch-size: "400"
      loki-retries: "2"
      loki-max-backoff: "1s"
      labels: "app=trafico-collector"
      max-size: "10m"
      max-file: "3"

services:
  collector-realtime:
    <<: *collector-base
    container_name: collector-realtime
    environment:
      CRONTAB_TIER: realtime
    mem_limit: 3072m
    cpus: 2.0

  collector-frequent:
    <<: *collector-base
    container_name: collector-frequent
    environment:
      CRONTAB_TIER: frequent
    mem_limit: 256m
    cpus: 0.5

  collector-fuel:
    <<: *collector-base
    container_name: collector-fuel
    environment:
      CRONTAB_TIER: fuel
    mem_limit: 512m
    cpus: 0.5

  collector-daily:
    <<: *collector-base
    container_name: collector-daily
    environment:
      CRONTAB_TIER: daily
    mem_limit: 1536m
    cpus: 1.0

  collector-weekly:
    <<: *collector-base
    container_name: collector-weekly
    environment:
      CRONTAB_TIER: weekly
    mem_limit: 2048m
    mem_reservation: 1g
    cpus: 1.0

  collector-ais:
    <<: *collector-base
    container_name: collector-ais
    restart: always
    environment:
      TASK: ais-stream
      COLLECTOR_DURATION: "0"
    command: ["node", "--import", "tsx", "index.ts"]
    healthcheck:
      test: ["CMD", "sh", "-c", "kill -0 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    mem_limit: 512m
    cpus: 0.5

networks:
  web:
    external: true
