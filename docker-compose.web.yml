# trafico.live — Web Application
#
# Deploy as a Coolify "Docker Compose" application.
# Separate from collectors so web deploys don't rebuild ingestion.
#
# Domain: https://trafico.live

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      TYPESENSE_URL: ${TYPESENSE_URL}
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      API_KEYS: ${API_KEYS}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
      SENTRY_DSN: ${SENTRY_DSN}
      NODE_ENV: production
    mem_limit: 4096m
    mem_reservation: 1024m
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)throw new Error();process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    logging:
      driver: loki
      options:
        loki-url: "http://10.100.0.2:3100/loki/api/v1/push"
        loki-batch-size: "400"
        loki-retries: "2"
        loki-max-backoff: "1s"
        labels: "app=trafico-web"
        max-size: "50m"
        max-file: "5"
